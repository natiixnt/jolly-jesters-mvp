<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jolly Jesters</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:Inter,system-ui,-apple-system,sans-serif;
      background:#09090b; color:#fafafa;
    }
    .wrap{width:min(400px,92vw); padding:40px 0;}
    .logo{font-size:13px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:#a1a1aa; margin-bottom:32px;}
    h1{font-size:28px; font-weight:300; letter-spacing:-.03em; margin-bottom:8px;}
    .sub{color:#71717a; font-size:14px; margin-bottom:32px; line-height:1.5;}
    label{display:block; font-size:12px; font-weight:600; color:#a1a1aa; text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px;}
    input[type=password],input[type=text]{
      width:100%; height:48px; padding:0 16px; border-radius:8px;
      border:1px solid #27272a; background:#18181b; color:#fafafa;
      font-size:15px; outline:none; transition:border-color .2s;
    }
    input:focus{border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.15);}
    .pw-row{display:flex; gap:12px; align-items:center;}
    .pw-row input{flex:1;}
    .show-btn{
      font-size:11px; color:#71717a; background:none; border:1px solid #27272a;
      border-radius:6px; padding:6px 10px; cursor:pointer; white-space:nowrap;
    }
    .show-btn:hover{border-color:#3f3f46; color:#a1a1aa;}
    button[type=submit]{
      width:100%; height:48px; margin-top:24px; border:none; border-radius:8px;
      background:#fafafa; color:#09090b; font-size:14px; font-weight:600;
      cursor:pointer; transition:opacity .15s;
    }
    button[type=submit]:hover{opacity:.9;}
    .error{margin-top:16px; padding:12px 16px; border-radius:8px; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.2); color:#fca5a5; font-size:13px;}
    .footer{margin-top:48px; text-align:center; font-size:12px; color:#3f3f46;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">jolly jesters</div>
    <h1>Witaj z powrotem</h1>
    <p class="sub">Zaloguj sie do panelu analizy oplacalnosci</p>
    <form method="post" action="/login">
      <label for="password">haslo dostepu</label>
      <div class="pw-row">
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="wprowadz haslo" />
        <button type="button" class="show-btn" id="show-btn">pokaz</button>
      </div>
      <button type="submit">zaloguj</button>
    </form>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <div class="footer">analiza oplacalnosci produktow na Allegro</div>
  </div>
  <script>
    const pwd=document.getElementById('password'), btn=document.getElementById('show-btn');
    btn?.addEventListener('click',()=>{
      const show=pwd.type==='password';
      pwd.type=show?'text':'password';
      btn.textContent=show?'ukryj':'pokaz';
    });
  </script>
</body>
</html>
