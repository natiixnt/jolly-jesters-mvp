resolver 127.0.0.11 ipv6=off valid=10s;

upstream backend_app {
    zone backend_app 64k;
    # Re-resolve the backend container IP so nginx survives backend restarts/recreates.
    server backend:8000 resolve;
    keepalive 16;
}

limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    # Hide Nginx version
    server_tokens off;

    # Request body limits
    client_max_body_size 50m;
    client_body_buffer_size 1m;
    proxy_read_timeout 300s;
    proxy_connect_timeout 30s;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    # Limit request methods
    if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE)$) {
        return 405;
    }

    # serve a blank favicon to avoid 404 noise in console
    location = /favicon.ico { return 204; }

    location /login {
        limit_req zone=login_zone burst=5 nodelay;
        proxy_pass http://backend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://backend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
